{% extends "base.html" %}

{% block title %}Artigos{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <h1 class="h2 mb-4"><i class="fas fa-book-medical text-success me-3"></i>Artigos de Saúde</h1>
    
    <div class="row g-4">
        {% for artigo in artigos %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 border-0 shadow-sm hover-card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-secondary">{{ artigo.categoria }}</span>
                        <small class="text-muted">{{ artigo.data_publicacao[:10] }}</small>
                    </div>
                    <h5 class="card-title mb-3">{{ artigo.titulo }}</h5>
                    <p class="card-text text-muted">{{ artigo.resumo }}</p>
                </div>
                <div class="card-footer bg-white border-0 px-4 pb-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted"><i class="fas fa-user me-1"></i>{{ artigo.autor }}</small>
                        <a href="{{ url_for('artigo_detalhe', id=artigo.id) }}" class="btn btn-primary btn-sm">Ler artigo</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
